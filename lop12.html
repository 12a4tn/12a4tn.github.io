    <script>
        // ========== LOAD 1 LẦN DUY NHẤT, KHÔNG LOAD LẠI KHI LƯỚT ==========
        let currentImageIndex = 1;
        const totalImages = 120;
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxCounter = document.getElementById('lightbox-counter');
        const progressBar = document.getElementById('progressBar');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const galleryGrid = document.getElementById('galleryGrid');

        let processedImages = 0;
        let existingImages = 0;
        let imageCache = {}; // Cache ảnh để không load lại

        function updateProgress() {
            const progress = (processedImages / totalImages) * 100;
            progressBar.style.width = progress + '%';
            loadingIndicator.querySelector('span').textContent = `Đang tải ảnh... ${processedImages}/${totalImages}`;
        }

        function checkAndHideLoading() {
            if (processedImages === totalImages) {
                setTimeout(() => {
                    loadingIndicator.classList.remove('show');
                }, 300);
                setTimeout(() => {
                    progressBar.style.width = '0%';
                }, 500);
                console.log(`Đã load xong ${existingImages} ảnh thực tế.`);
            }
        }

        // Load 1 ảnh và cache lại
        function loadImageAndCache(index) {
            return new Promise((resolve) => {
                const imgUrl = `n3img${index}.jpg`;
                const img = new Image();
                img.onload = () => {
                    imageCache[index] = imgUrl;
                    addImageToGrid(index, imgUrl);
                    resolve(true);
                };
                img.onerror = () => {
                    addEmptyFrame(index);
                    resolve(false);
                };
                img.src = imgUrl;
            });
        }

        async function loadAllImages() {
            loadingIndicator.classList.add('show');
            
            // Load lần lượt từng ảnh, không batch để tránh xung đột
            for (let i = 1; i <= totalImages; i++) {
                const exists = await loadImageAndCache(i);
                if (exists) existingImages++;
                processedImages++;
                updateProgress();
                checkAndHideLoading();
                
                // Nghỉ nhẹ để UI không bị đơ
                if (i % 10 === 0) {
                    await new Promise(r => setTimeout(r, 10));
                }
            }
        }

        function addImageToGrid(index, imgUrl) {
            const item = document.createElement('div');
            item.className = 'gallery-item';
            
            const img = document.createElement('img');
            // QUAN TRỌNG: BỎ loading="lazy" để ảnh không load lại khi lướt
            // img.loading = 'lazy';  // ĐÃ XÓA
            img.src = imgUrl;
            img.alt = `Kỷ niệm lớp 12 - ${index}`;
            
            item.appendChild(img);
            galleryGrid.appendChild(item);
            item.onclick = () => openLightbox(index);
        }

        function addEmptyFrame(index) {
            const item = document.createElement('div');
            item.className = 'gallery-item empty';
            galleryGrid.appendChild(item);
        }

        function openLightbox(index) {
            const imgUrl = imageCache[index] || `n3img${index}.jpg`;
            const img = new Image();
            img.onload = function() {
                currentImageIndex = index;
                lightboxImg.src = imgUrl;
                lightboxCounter.textContent = `${index} / ${totalImages}`;
                lightbox.classList.add('active');
                document.body.style.overflow = 'hidden';
            };
            img.onerror = function() {
                alert(`Ảnh ${index} không tồn tại!`);
            };
            img.src = imgUrl;
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function changeImage(direction) {
            const newIndex = currentImageIndex + direction;
            if (newIndex < 1 || newIndex > totalImages) return;
            
            const imgUrl = imageCache[newIndex] || `n3img${newIndex}.jpg`;
            const img = new Image();
            img.onload = function() {
                currentImageIndex = newIndex;
                lightboxImg.src = imgUrl;
                lightboxCounter.textContent = `${newIndex} / ${totalImages}`;
            };
            img.onerror = function() {
                alert(`Ảnh ${newIndex} không tồn tại!`);
            };
            img.src = imgUrl;
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && lightbox.classList.contains('active')) {
                closeLightbox();
            }
            if (e.key === 'ArrowLeft' && lightbox.classList.contains('active')) {
                changeImage(-1);
            }
            if (e.key === 'ArrowRight' && lightbox.classList.contains('active')) {
                changeImage(1);
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            loadAllImages();
        });
    </script>
</body>
</html>
