<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12A4 - Kỷ niệm lớp 10</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Font chữ cao cấp -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #0a0c0f;
            color: #ffffff;
            line-height: 1.6;
        }

        /* Thanh điều hướng */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 5%;
            background: rgba(10, 12, 15, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
        }

        .logo::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 60%;
            height: 2px;
            background: linear-gradient(90deg, #ff6b6b, transparent);
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
        }

        .nav-links a {
            text-decoration: none;
            color: #9a9a9a;
            font-weight: 500;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            position: relative;
        }

        .nav-links a:hover {
            color: #ff6b6b;
        }

        .nav-links a::before {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 1px;
            background: #ff6b6b;
            transition: 0.3s;
        }

        .nav-links a:hover::before {
            width: 100%;
        }

        /* Hero Section với Video Background */
        .hero {
            min-height: 60vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            overflow: hidden;
        }

        .hero-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            z-index: -1;
        }

        .hero::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
        }

        .hero-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            color: #ff6b6b;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .hero-content p {
            font-size: 1.2rem;
            color: white;
        }

        .back-home {
            display: inline-block;
            margin-top: 1.5rem;
            color: white;
            text-decoration: none;
            padding: 0.8rem 2rem;
            border: 2px solid #ff6b6b;
            border-radius: 50px;
            transition: 0.3s;
            font-weight: 600;
            background: rgba(255,107,107,0.1);
        }

        .back-home:hover {
            background: #ff6b6b;
            color: #0a0c0f;
        }

        /* Memory Navigation */
        .memory-nav {
            display: flex;
            justify-content: center;
            gap: 2rem;
            padding: 2rem 5%;
            background: #0f1115;
            flex-wrap: wrap;
        }

        .memory-btn {
            padding: 1rem 2.5rem;
            border: 2px solid;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .memory-btn.lop10 {
            border-color: #ff6b6b;
            color: #ff6b6b;
            background: rgba(255,107,107,0.1);
        }

        .memory-btn.lop10:hover {
            background: #ff6b6b;
            color: white;
        }

        .memory-btn.lop11 {
            border-color: #4ecdc4;
            color: #4ecdc4;
        }

        .memory-btn.lop11:hover {
            background: #4ecdc4;
            color: white;
        }

        .memory-btn.lop12 {
            border-color: #feca57;
            color: #feca57;
        }

        .memory-btn.lop12:hover {
            background: #feca57;
            color: white;
        }

        /* Progress Bar */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #ff6b6b, #ff8e8e);
            z-index: 1000;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px #ff6b6b;
        }

        /* Loading Indicator */
        .loading-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 12, 15, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            border-radius: 60px;
            border: 2px solid #ff6b6b;
            color: #ff6b6b;
            font-weight: 600;
            z-index: 1000;
            display: none;
            align-items: center;
            gap: 15px;
            box-shadow: 0 0 30px rgba(255,107,107,0.3);
        }

        .loading-indicator.show {
            display: flex;
        }

        .loading-indicator i {
            font-size: 1.5rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Gallery Stats */
        .gallery-stats {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            padding: 2rem 5%;
            background: rgba(255,107,107,0.05);
            border-bottom: 1px solid rgba(255,107,107,0.2);
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: #ff6b6b;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #9a9a9a;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Gallery Section */
        .gallery-section {
            padding: 3rem 5%;
        }

        .gallery-header {
            margin-bottom: 2rem;
            text-align: center;
        }

        .gallery-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: #ff6b6b;
            margin-bottom: 0.5rem;
        }

        .gallery-header p {
            color: #9a9a9a;
            font-size: 1.1rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.8rem;
            margin-top: 3rem;
        }

        .skeleton-item {
            aspect-ratio: 1;
            border-radius: 15px;
            background: linear-gradient(90deg, #1a1e24 25%, #2a2e34 50%, #1a1e24 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
            border: 2px solid rgba(255,107,107,0.1);
        }

        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .gallery-item {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            aspect-ratio: 1;
            cursor: pointer;
            border: 2px solid rgba(255,107,107,0.3);
            transition: all 0.4s ease;
            background: #1a1e24;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.5s forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .gallery-item:nth-child(1) { animation-delay: 0.1s; }
        .gallery-item:nth-child(2) { animation-delay: 0.15s; }
        .gallery-item:nth-child(3) { animation-delay: 0.2s; }
        .gallery-item:nth-child(4) { animation-delay: 0.25s; }
        .gallery-item:nth-child(5) { animation-delay: 0.3s; }
        .gallery-item:nth-child(6) { animation-delay: 0.35s; }
        .gallery-item:nth-child(7) { animation-delay: 0.4s; }
        .gallery-item:nth-child(8) { animation-delay: 0.45s; }
        .gallery-item:nth-child(9) { animation-delay: 0.5s; }
        .gallery-item:nth-child(10) { animation-delay: 0.55s; }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
            display: block;
            will-change: transform;
        }

        .gallery-item:hover {
            border-color: #ff6b6b;
            box-shadow: 0 15px 30px rgba(255,107,107,0.3);
            transform: translateY(-8px);
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        /* Empty state - ảnh trống */
        .gallery-item.empty {
            background: #1a1e24;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed rgba(255,107,107,0.3);
            cursor: default;
        }

        .gallery-item.empty::before {
            content: "📸";
            font-size: 3rem;
            opacity: 0.3;
        }

        .gallery-item.empty:hover {
            border-color: #ff6b6b;
            transform: translateY(-8px);
        }

        .gallery-item.empty:hover::before {
            opacity: 0.5;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.98);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .lightbox.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .lightbox-content {
            position: relative;
            max-width: 90vw;
            max-height: 90vh;
            text-align: center;
        }

        .lightbox-content img {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 10px;
            border: 3px solid #ff6b6b;
            box-shadow: 0 0 30px rgba(255,107,107,0.5);
        }

        .lightbox-close {
            position: absolute;
            top: -50px;
            right: 0;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            transition: 0.3s;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            border: 2px solid #ff6b6b;
        }

        .lightbox-close:hover {
            color: #ff6b6b;
            transform: rotate(90deg);
            background: rgba(255,107,107,0.1);
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
        }

        .lightbox-nav button {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #ff6b6b;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            transition: 0.3s;
        }

        .lightbox-nav button:hover {
            background: #ff6b6b;
            color: #0a0c0f;
        }

        .lightbox-counter {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            border: 2px solid #ff6b6b;
            color: #ff6b6b;
        }

        /* Footer */
        .footer {
            background: #050708;
            padding: 3rem 5% 1.5rem;
            margin-top: 3rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            color: #666;
        }

        .footer a {
            color: #ff6b6b;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 1rem;
            }
            
            .nav-links {
                gap: 1.5rem;
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .hero-content h1 {
                font-size: 3rem;
            }
            
            .memory-nav {
                flex-direction: column;
                align-items: center;
                gap: 1rem;
            }
            
            .memory-btn {
                width: 100%;
                max-width: 250px;
                justify-content: center;
            }
            
            .gallery-stats {
                flex-direction: column;
                gap: 1rem;
            }
            
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 1rem;
            }

            .gallery-header h2 {
                font-size: 2rem;
            }

            .lightbox-nav button {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <div class="progress-bar" id="progressBar"></div>

    <!-- Loading Indicator -->

        <i class="fas fa-circle-notch"></i>
        <span>Đang tải ảnh... 0/50</span>
    </div>

    <!-- Thanh điều hướng -->
    <nav class="navbar">
        <div class="logo">12A4</div>

            <a href="index.html">TRANG CHỦ</a>

        <a href="lop11.html" class="memory-btn lop11"><i class="fas fa-tree"></i> LỚP 11</a>
        <a href="lop12.html" class="memory-btn lop12"><i class="fas fa-crown"></i> LỚP 12</a>
    </div>

    <!-- Gallery Stats -->
    <div class="gallery-stats">
        <div class="stat-item">
            <div class="stat-number">50</div>
            <div class="stat-label">KHOẢNH KHẮC</div>
        </div>
        <div class="stat-item">
            <div class="stat-number">2023-2024</div>

    <!-- Gallery Grid -->
    <div class="gallery-grid" id="galleryGrid"></div>

    <div class="lightbox" id="lightbox">

            <span class="lightbox-close" onclick="closeLightbox()">&times;</span>

            <div class="lightbox-nav">
                <button onclick="changeImage(-1)"><i class="fas fa-chevron-left"></i></button>
                <button onclick="changeImage(1)"><i class="fas fa-chevron-right"></i></button>

    <footer class="footer">
        <p>&copy; 2026 LỚP 12A4 - <a href="index.html">Kỷ niệm lớp 10</a></p>

    <script>
        // Lightbox variables
        let currentImageIndex = 1;
        const totalImages = 50; // Tổng số khung (kể cả khung trống)
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxCounter = document.getElementById('lightbox-counter');
        const progressBar = document.getElementById('progressBar');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const galleryGrid = document.getElementById('galleryGrid');

        // Đếm số ảnh đã xử lý (bao gồm cả ảnh không tồn tại)
        let processedImages = 0;
        let existingImages = 0; // Đếm ảnh thực sự có

        // Tạo skeleton loading
        function showSkeleton() {
            galleryGrid.innerHTML = '';
            for (let i = 0; i < 12; i++) {
                const skeleton = document.createElement('div');
                skeleton.className = 'skeleton-item';
                galleryGrid.appendChild(skeleton);
            }
        }

        // Cập nhật tiến trình tải
        function updateProgress() {
            const progress = (processedImages / totalImages) * 100;
            progressBar.style.width = progress + '%';
            loadingIndicator.querySelector('span').textContent = `Đang tải ảnh... ${processedImages}/${totalImages}`;
        }

        // Kiểm tra và ẩn loading indicator khi hoàn tất
        function checkAndHideLoading() {
            if (processedImages === totalImages) {
                // Xóa skeleton
                const skeletons = galleryGrid.querySelectorAll('.skeleton-item');
                skeletons.forEach(s => s.remove());
                
                // Ẩn loading indicator
                setTimeout(() => {
                    loadingIndicator.classList.remove('show');
                }, 300);
                
                // Ẩn progress bar
                setTimeout(() => {
                    progressBar.style.width = '0%';
                }, 500);
                
                console.log(`Đã xử lý xong ${totalImages} khung. ${existingImages} ảnh thực tế.`);
            }
        }

        // Kiểm tra ảnh có tồn tại không
        function imageExists(url) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => resolve(true);
                img.onerror = () => resolve(false);
                img.src = url;
            });
        }

        // Tải ảnh theo nhóm
        async function loadImagesInBatches() {
            showSkeleton();
            loadingIndicator.classList.add('show');
            
            const batchSize = 6;
            
            for (let i = 1; i <= totalImages; i++) {
                const imgUrl = `n1img${i}.jpg`;
                const exists = await imageExists(imgUrl);
                
                if (exists) {
                    existingImages++;
                    addImageToGrid(i, imgUrl);
                } else {
                    // Thêm khung trống nếu ảnh không tồn tại
                    addEmptyFrame(i);
                }
                
                processedImages++;
                updateProgress();
                
                // Kiểm tra nếu đã xử lý xong tất cả
                if (processedImages === totalImages) {
                    checkAndHideLoading();
                }
                
                // Tải theo batch
                if (i % batchSize === 0) {
                    await new Promise(resolve => setTimeout(resolve, 50));
                }
            }
        }

        // Thêm ảnh vào grid
        function addImageToGrid(index, imgUrl) {
            const item = document.createElement('div');
            item.className = 'gallery-item';
            item.style.setProperty('--i', index);
            
            const img = document.createElement('img');
            img.loading = 'lazy';
            img.src = imgUrl;
            img.alt = `Kỷ niệm lớp 10 - ${index}`;
            
            item.appendChild(img);
            item.style.opacity = '0';
            galleryGrid.appendChild(item);
            
            // Force reflow để animation chạy
            item.offsetHeight;
            item.style.opacity = '1';
            
            item.onclick = () => openLightbox(index);
        }

        // Thêm khung trống
        function addEmptyFrame(index) {
            const item = document.createElement('div');
            item.className = 'gallery-item empty';
            item.style.setProperty('--i', index);
            item.setAttribute('data-empty', 'true');
            
            galleryGrid.appendChild(item);
            item.style.opacity = '0';
            item.offsetHeight;
            item.style.opacity = '1';
            
            // Khung trống không có sự kiện click
        }

        // Lightbox functions
        function openLightbox(index) {
            // Kiểm tra xem ảnh có tồn tại không trước khi mở lightbox
            const imgUrl = `n1img${index}.jpg`;
            const img = new Image();
            img.onload = function() {
                currentImageIndex = index;
                updateLightboxImage();
                lightbox.classList.add('active');
                document.body.style.overflow = 'hidden';
            };
            img.onerror = function() {
                alert(`Ảnh ${index} không tồn tại!`);
            };
            img.src = imgUrl;
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function changeImage(direction) {
            const newIndex = currentImageIndex + direction;
            if (newIndex < 1 || newIndex > totalImages) return;
            
            // Kiểm tra ảnh mới có tồn tại không
            const imgUrl = `n1img${newIndex}.jpg`;
            const img = new Image();
            img.onload = function() {
                currentImageIndex = newIndex;
                updateLightboxImage();
            };
            img.onerror = function() {
                alert(`Ảnh ${newIndex} không tồn tại!`);
            };
            img.src = imgUrl;
        }

        function updateLightboxImage() {
            lightboxImg.src = `n1img${currentImageIndex}.jpg`;
            lightboxCounter.textContent = `${currentImageIndex} / ${totalImages}`;
        }

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && lightbox.classList.contains('active')) {
                closeLightbox();
            }
            if (e.key === 'ArrowLeft' && lightbox.classList.contains('active')) {
                changeImage(-1);
            }
            if (e.key === 'ArrowRight' && lightbox.classList.contains('active')) {
                changeImage(1);
            }
        });

        // Start loading
        document.addEventListener('DOMContentLoaded', () => {
            loadImagesInBatches();
        });
    </script>
</body>
</html>
